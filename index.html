<script src="https://d3js.org/d3.v5.min.js"></script>
<script type="text/javascript">
	var myFullpage = new fullpage('#fullpage', {
		sectionsColor: ['#f2f2f2', '#4BBFC3', '#7BAABE', 'whitesmoke', '#ccddff']
	});


        var io_workload = null, user_activities, db_time_spent;

        d3.csv("./IO_workload.csv", function(loadedRows) {
               io_workload = loadedRows;
               doSomethingWithRows(loadedRows);
        });

        d3.csv("./User_Activities.csv", function(loadedRows) {
               user_activities = loadedRows;
               doSomethingWithRows(loadedRows);
        });

        d3.csv("./Db_Time_Spent.csv", function(loadedRows) {
               db_time_spent = loadedRows;


               doSomethingWithRows(loadedRows);
        });

        function doSomethingWithRows(csv) {

								 });

        }

</script>
