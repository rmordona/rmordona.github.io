	<style>
	.d3-tip {
		line-height: 1;
		padding: 6px;
		background: rgba(0, 0, 0, 0.8);
		color: #fff;
		border-radius: 4px;
		font-size: 12px;
	}

	/* Creates a small triangle extender for the tooltip */
	.d3-tip:after {
		box-sizing: border-box;
		display: inline;
		font-size: 10px;
		width: 100%;
		line-height: 1;
		color: rgba(0, 0, 0, 0.8);
		content: "\25BC";
		position: absolute;
		text-align: center;
	}

	/* Style northward tooltips specifically */
	.d3-tip.n:after {
		margin: -2px 0 0 0;
		top: 100%;
		left: 0;
	}


	.overlay {
		fill: none;
		pointer-events: all;
	}

	.focus {
		font-size: 14px;
	}

	.focus circle {
		fill: #5e8dc9;
	}

	path {
    stroke: steelblue;
    stroke-width: 2;
    fill: none;
	}

	.axis path,
	.axis line {
    fill: none;
    stroke: grey;
    stroke-width: 1;
    shape-rendering: crispEdges;
	}

	function handle_Active_DB_Sessions(data) {

		  no_active_sessions = [] // data


		  var max_value = -1
		  var min_value = -1
		  var rows = 0

			var parseTime = d3.timeParse("%B %d %Y");

		  data.forEach( function(d) {
			 	var m =  d["Sessions"] - 0
			 	m = ( m == 0 ) ? -1 : m
			 	if (max_value == -1 || m > max_value ) {
				 	if (!isNaN(m)) max_value = m
			 	}
			 	if (min_value == -1 || m < min_value ) {
				 	if (!isNaN(m)) min_value = m
			 	}
			 	rows ++

				no_active_sessions.push( {
						//date:   new Date(d["Month of Date"] + " " + d["Day of Date"] + " " + d["Year of Date"]),
						date: parseTime( d["Month of Date"] + " " + d["Day of Date"] + " " + d["Year of Date"] ),
						sessions: d["Sessions"] - 0
					}
				)
			 //	console.log(no_active_sessions[rows - 1].sessions +  "/" + no_active_sessions[rows -1].date)
		  })


		  var margin = { top: 20, right: 20, bottom: 30, left: 50},
		     width = 960 - margin.left - margin.right,
				 height = 500 - margin.top - margin.bottom;

			// http://bl.ocks.org/binaworks/9dce0a385915e8953a45cc6be7fbde42
			// Margin Convention
			var join = d3.select("#svg_DBSession")
			 		.attr("width", width + margin.left + margin.right)
					.attr("height", height + margin.top + margin.bottom)
			var g = join.append("g").attr("transform", "translate(" + margin.left + "," + margin.top + ")");

			//var x = d3.scaleTime()
			//		.rangeRound([0, width]);

			//var y = d3.scaleLinear()
			//		.rangeRound([height, 0]);

			// set the ranges
			var x = d3.scaleTime().range([0, width]);
			var y = d3.scaleLinear().range([height, 0]);

			var dline = d3.line()
			    .x(function(d,i) { return x(d.date);})
			    .y(function(d) {	return y(d.sessions); }
					);

	  	var tip = d3.tip()
				.attr('class', 'd3-tip')
				.offset([-10, 0])
				.html(function(d) {
					var tip = "<strong>Sessions:</strong> <span style='color:dodgerblue'>" + d.sessions + "</span>";
					return tip
		  })

			x.domain(d3.extent(no_active_sessions, function(d) {  return d.date; }));
		  y.domain(d3.extent(no_active_sessions, function(d) { return d.sessions; }));
  		// y.domain([0, d3.max(no_active_sessions, function(d) {  return d.sessions; })]);
			// x.domain(no_active_sessions.map( function(d) { return d.date; }));

		  g.append("g")
		      .attr("transform", "translate(0," + height + ")")
		      .call(d3.axisBottom(x));
		    //.select(".domain")
		     // .remove();

		  g.append("g")
		      .call(d3.axisLeft(y))
		    .append("text")
		      .attr("fill", "#000")
		      .attr("transform", "rotate(-90)")
		      .attr("y", 6)
		      .attr("dy", "0.71em")
		      .attr("text-anchor", "end")
		      .text("Sessions");

				// https://stackoverflow.com/questions/30485750/d3-line-chart-using-path-is-not-showing-anything
			 g.append("g")
			 		.append("path")
		      .attr("fill", "none")
		      .attr("stroke", "steelblue")
		      .attr("stroke-linejoin", "round")
		      .attr("stroke-linecap", "round")
		      .attr("stroke-width", 1.5)
		      .attr("d", dline(no_active_sessions))

					//Tooltips
				//	http://bl.ocks.org/jadiehm/311fcceab8425ddf1944
				// http://www.d3noob.org/2014/07/my-favourite-tooltip-method-for-line.html

				//Divides date for tooltip placement
				var bisectDate = d3.bisector(function(d) { return d.date; }).left;

			  var focus = g.append("g")
			      .attr("class", "focus")
			      .style("display", "none");

			  //Adds circle to focus point on line
			  //focus.append("circle")
			  //    .attr("r", 4);

					// append the circle at the intersection
		    focus.append("circle")
				    .style("stroke", "red")
						.style("fill", "red")
		        .attr("r", 6)

			  //Adds text to focus point on line
				focus.append('rect')
				.attr("width", 150 )
				.attr("height", 50 )
				.style("stroke", "white")
				.style("fill", "black")
				.attr("x", 9)
				.attr("y", -9)

			  focus.append("text")
			      .attr("x", 19)
						.attr("y", 5)
			      .attr("dy", ".35em")
						.attr("fill", "#000")
						.style('position', 'absolute')
						.style('opacity', 1)
						.style('pointer-events', 'all')
						.style('fill', 'white')

				focus.append("text")
			      .attr("x", 19)
						.attr("y", 25)
			      .attr("dy", ".35em")
						.attr("fill", "#000")
						.style('position', 'absolute')
						.style('opacity', 1)
						.style('pointer-events', 'all')
						.style('fill', 'white')

				// append the x line
		     focus.append("line")
		         .attr("class", "x")
		         .style("stroke", "blue")
		         .style("stroke-dasharray", "3,3")
		         .style("opacity", 0.5)
		         .attr("y1", 0)
		         .attr("y2", height);

		     // append the y line
		     focus.append("line")
		         .attr("class", "y")
		         .style("stroke", "blue")
		         .style("stroke-dasharray", "3,3")
		         .style("opacity", 0.5)
		         .attr("x1", -width)
		         .attr("x2", 0);


				//Creates larger area for tooltip
			  var overlay = g.append("rect")
			      .attr("class", "overlay")
			      .attr("width", width)
			      .attr("height", height)
			      .on("mouseover", function() { focus.style("display", null); })
			      .on("mouseout", function() { focus.style("display", "none"); })
			      .on("mousemove", mousemove);

			  //Tooltip mouseovers
			  function mousemove() {
			    var x0 = x.invert(d3.mouse(this)[0]),
			        i = bisectDate(no_active_sessions, x0, 1),
			        d0 = no_active_sessions[i - 1],
			        d1 = no_active_sessions[i], d;
							if (typeof(d0) != "undefined" && typeof(d1) != "undefined") {
			        	d = x0 - d0.date > d1.date - x0 ? d1 : d0;
			    			focus.attr("transform", "translate(" + x(d.date) + "," + y(d.sessions) + ")");
			    			focus.selectAll("text").text("session: " + d.sessions);
							}
			  };



				console.log('zLoaded')
	}

	function handle_IO_workload(data) {

			 io_workload = data

			 var max_value = -1
			 var min_value = -1
			 var rows = 0

			 io_workload.forEach( function(d) {
				 var m =  d["Measure Values"] - 0
				 m = ( m == 0 ) ? -1 : m
				 if (max_value == -1 || m > max_value ) {
					 if (!isNaN(m)) max_value = m
				 }
				 if (min_value == -1 || m < min_value ) {
					 if (!isNaN(m)) min_value = m
				 }
				 rows ++
				 // console.log(d["Servers"] + "/" + d["Measure Names"] + "/" + d["Measure Values"])
			 })


			 var margin = { top: 20, right: 20, bottom: 50, left: 50},
			     width = 960 - margin.left - margin.right,
					 height = 500 - margin.top - margin.bottom;

			// http://bl.ocks.org/binaworks/9dce0a385915e8953a45cc6be7fbde42
			// Margin Convention
			var join = d3.select("#svg_IOworkload")
			 		.attr("width", width + margin.left + margin.right)
					.attr("height", height + margin.top + margin.bottom)
					.append("g")
						.attr("transform", "translate(" + margin.left + "," +
								margin.top + ")")

			var x = d3.scaleBand()
			          .range([0, width])
			          .padding(0.1);

			var y = d3.scaleLinear()
				    .domain([0, max_value ])
				    .range([ height , 0]);

		  x.domain(io_workload.map( function(d) {
				return d["Measure Names"] + "(" + d["Servers"] + ")"; })
			);

			var yAxis = d3.axisLeft(y);

	  	var tip = d3.tip()
				.attr('class', 'd3-tip')
				.offset([-10, 0])
				.html(function(d) {
					var tip = "<strong>PhysRead/Txn:</strong> <span style='color:dodgerblue'>" + d["Measure Values"] + "</span>";
					if (d["Measure Names"] == "PhysWrite/Txn") {
						 tip = "<strong>PhysWrite/Txn:</strong> <span style='color:darkorange'>" + d["Measure Values"] + "</span>";
					 }
					 return tip
		  })


			 join.selectAll("rect").data(io_workload)
						.enter()
						.append("rect")
					  .attr("class", "bar")
						// rect attributes
						.attr("y", function(d) { return ( height ) - d["Measure Values"] * 1.3 } )
						.attr("x", function(d,i) { return i * 30 + 25  } )
						.attr("style", function(d) {
							  var fill = "fill: dodgerblue;stroke-width:1;stroke: black"
							  if (d["Measure Names"] == "PhysWrite/Txn") {
									 fill = "fill: darkorange;stroke-width:1;stroke: black"
							   }
								 return fill;
							})
						.attr("height", function (d) {	return d["Measure Values"] * 1.3    })
						.attr("width", function(d) { return 25 })
						// tooltip
						.on('mouseover', tip.show)
						.on('mouseout', tip.hide)

			 join.call(tip)
			 join.append("g").call(yAxis)
			 join.append("g")
							.attr("class", "axis")
					      .attr("transform", "translate(0," + height + ")")
					      .call(d3.axisBottom(x))
							.selectAll("text")
								.style("text-anchor", "end")
								.attr("dx", "-.8em")
								.attr("dy", ".15em")
								.attr("transform", "rotate(-65)");


				console.log('aLoaded', width, height, min_value, max_value, rows)
	}

	function handle_DB_Time_Spent(data) {

			 db_time_spent = data
			/*  db_time_spent.forEach( function(d) {

			 }
		 ); */
				console.log('bLoaded')
	}

	function done() {

	}

</script>
